<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blissé | Backend System</title>
  <meta name="description" content="ระบบหลังบ้านสำหรับจัดการและตรวจสอบออเดอร์ — สงวนสิทธิ์การใช้งานสำหรับบุคลากรที่ได้รับอนุญาตเท่านั้น" />
  <link rel="shortcut icon" href="https://lh3.googleusercontent.com/d/1Z6epAXtRcw0K6ad_32EjbYhuXSKm6JTq" />
  <style>
    :root{ --bg:#f5f6f7; --ink:#111827; }
    body{ margin:0; padding:10px; font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto; }
    header{text-align:center;margin-bottom:14px;margin-top:15px}
    header .main{font-size:1.4rem;font-weight:700;letter-spacing:.6px}
    header .sub{font-size:.9rem;font-weight:400;opacity:.6;margin-top:4px}
    #frame{width:100%;height:calc(100dvh - 130px);border:0;background:#fff;display:none}
    #loading{margin-top:14px;font-size:.9rem;opacity:.6;text-align:center}
    #brandRefresh { cursor:pointer; color:inherit; text-decoration:none; transition:opacity .2s; }
    #brandRefresh:hover { opacity:0.6; }

    
    /* กล่องสำรอง เผื่อ iframe โดนบล็อก */
    #fallbackBox{
      display:none; max-width:420px; margin:30px auto 0; text-align:center;
      padding:20px; border:1px solid #e5e7eb; border-radius:12px; background:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,.06);
    }
    #fallbackBox p{ font-size:.9rem; color:#6b7280; margin:0 0 14px; line-height:1.6; }
    #fallbackBox a.btn{
      display:inline-block; padding:12px 22px; background:#111827; color:#fff;
      border-radius:8px; text-decoration:none; font-size:.95rem; font-weight:600;
    }
    #fallbackBox a.btn:hover{ opacity:.85; }
  </style>
</head>
<body>
<header>
  <div class="main"><span id="brandRefresh">Blissé</span> Backend ©</div>
  <div class="sub">ระบบหลังบ้านสำหรับการใช้งานภายในองค์กรเท่านั้น</div>
  <div id="loading">กำลังโหลดระบบ...</div>
</header>

<!-- ✅ ปรับ: referrerpolicy เพื่อช่วยให้ Google ยอมให้ฝัง -->
<iframe id="frame" referrerpolicy="no-referrer-when-downgrade"></iframe>

<!-- ✅ กล่องสำรอง: ถ้า iframe โดนบล็อก จะโชว์ปุ่มให้เปิดเต็มหน้าแทน -->
<div id="fallbackBox">
  <p>ระบบไม่สามารถแสดงในกรอบได้ (ข้อจำกัดจาก Google)<br>กรุณาแตะปุ่มด้านล่างเพื่อเปิดระบบ</p>
  <a href="#" class="btn" id="fallbackBtn">เปิดระบบ Blissé</a>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
  const GAS_EXEC_URL = "https://script.google.com/macros/s/AKfycbwrWUrm9qRq0009-RjUdBmu_j2Y2LsYK5uYtT2K9mc-eTy31CxOVLxAQ_Lu2eFUGIo/exec";
  const MY_LIFF_ID   = "2010125469-vugCvunJ";

  const frame   = document.getElementById("frame");
  const loading = document.getElementById("loading");

  function buildTargetUrl(uid){
    const usp = new URLSearchParams(location.search);
    usp.delete("uid");
    const params = new URLSearchParams(usp);
    if (uid) params.set("uid", uid);
    return GAS_EXEC_URL + (params.toString() ? ("?" + params.toString()) : "");
  }

  function showFallback(targetUrl){
    loading.style.display = "none";
    frame.style.display = "none";
    const box = document.getElementById("fallbackBox");
    const btn = document.getElementById("fallbackBtn");
    btn.href = targetUrl;
    btn.onclick = (e)=>{ e.preventDefault(); window.top.location.href = targetUrl; };
    box.style.display = "block";
  }

  function loadIntoFrame(targetUrl){
    let frameLoaded = false;

    frame.addEventListener("load", ()=>{
      frameLoaded = true;
      loading.style.display = "none";
      frame.style.display = "block";
    });

    frame.src = targetUrl;

    // ✅ ถ้าเกิน 6 วิ iframe ยังไม่ยิง onload = น่าจะโดนบล็อก → โชว์ปุ่มสำรอง
    setTimeout(()=>{
      if (!frameLoaded){
        showFallback(targetUrl);
      }
    }, 6000);
  }

  (async () => {
    try {
      const usp = new URLSearchParams(location.search);
      usp.delete("uid");
      const REDIRECT_URI = location.origin + location.pathname + (usp.toString() ? ("?" + usp.toString()) : "");

      const brand = document.getElementById('brandRefresh');
      brand?.addEventListener('click', (e) => {
        e.preventDefault();
        location.replace(REDIRECT_URI);
      });

      await liff.init({ liffId: MY_LIFF_ID, withLoginOnExternalBrowser: true });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: REDIRECT_URI });
        return;
      }

      const profile = await liff.getProfile();
      const decoded = liff.getDecodedIDToken?.() || {};
      const uid = decoded.sub || profile.userId || "";

      if (uid) {
        fetch(GAS_EXEC_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            action: "logLiff",
            userId: uid,
            displayName: profile.displayName || "",
            pictureUrl: profile.pictureUrl || ""
          })
        }).catch(() => {});
      }

      loadIntoFrame(buildTargetUrl(uid));

    } catch (e) {
      console.error("LIFF error:", e);
      loadIntoFrame(buildTargetUrl(""));
    }
  })();
</script>

</body>
</html>
