  background:#f9fafb; 
  font-weight:600;

  z-index:2; 
  text-align:left;

  user-select:none

th:hover{ 
  background:#f3f4f6

}

    gap:5px;

  }

    overflow:hidden;
    text-overflow:clip;
    white-space:nowrap;

  }

<script>
// ✅ สถาปัตยกรรมใหม่: หน้านี้อยู่บน GitHub เรียกข้อมูลจาก Apps Script ผ่าน fetch → JSON
// ไม่ใช้ iframe / google.script.run ของ GAS อีก จึงไม่โดน X-Frame-Options บล็อก

// ⚠️ แก้ URL นี้ให้เป็น /exec ของ Web App คุณ (Deploy → Manage deployments → คัดลอก Web app URL)
const API_URL = "https://script.google.com/macros/s/AKfycbwrWUrm9qRq0009-RjUdBmu_j2Y2LsYK5uYtT2K9mc-eTy31CxOVLxAQ_Lu2eFUGIo/exec";

// UID: ใช้ getter ที่คืนค่า uid จาก LIFF login (set ทีหลังใน window.__RESOLVED_UID__)
// เผื่อกรณีเปิดตรงด้วย ?uid=... ก็ยังรองรับ
Object.defineProperty(window, "UID", {
  get(){ return window.__RESOLVED_UID__ || new URLSearchParams(location.search).get("uid") || ""; }
});

// รายชื่อ action ที่เป็น POST (เขียนข้อมูล) — ที่เหลือเป็น GET (อ่าน)
const POST_ACTIONS = new Set(["saveEditData", "exportToSheets", "logLiff"]);

// map: ชื่อ method → ชื่อ argument ตามลำดับ (ให้ shim รู้ว่าจะแปลง args เป็น param ยังไง)
const METHOD_ARGS = {
  getStructure:      [],
  openRow:           ["rowIndex", "uid"],
  getData:           ["rowIndex", "team", "month", "uid"],
  getDashboardData:  ["rowIndex", "months", "uid"],
  getTeamList:       [],
  getStructureInfo:  ["rowIndex", "uid"],
  getAmountColIndex: ["rowIndex", "uid"],
  getCheckCol:       ["rowIndex", "uid"],
  getEditData:       ["rowIndex", "dataRowIndex", "currentRowData", "uid"],
  saveEditData:      ["sheetId", "sheetName", "rowIndex", "updates", "uid"],
  exportToSheets:    ["data", "title", "uid"],
  logLiff:           ["userId", "displayName", "pictureUrl"]
};

// เรียก API จริง (คืน Promise)
async function callApi_(method, args){
  const argNames = METHOD_ARGS[method] || [];
  const isPost = POST_ACTIONS.has(method);

  if (isPost){
    // POST: ส่ง body เป็น JSON
    const body = { action: method };
    argNames.forEach((name, i)=>{ body[name] = args[i]; });
    const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(body) });
    return res.json();
  } else {
    // GET: แปะ params ต่อท้าย URL (object/array ถูก JSON.stringify ก่อน)
    const params = new URLSearchParams({ action: method });
    argNames.forEach((name, i)=>{
      let v = args[i];
      if (v === undefined || v === null) v = "";
      else if (typeof v === "object") v = JSON.stringify(v);
      params.set(name, v);
    });
    params.set("_t", Date.now()); // cache-buster กัน browser คืน response เก่า
    const res = await fetch(API_URL + "?" + params.toString());
    return res.json();
  }
}

// ✅ Shim: เลียนแบบ google.script.run API เดิม แต่ข้างในเรียก fetch()
// ทำให้โค้ดเดิมที่เขียนแบบ .withSuccessHandler(fn).withFailureHandler(fn).method(args) ใช้ได้เหมือนเดิม
const google = {
  script: {
    run: (function(){
      function makeRunner(){
        let successFn = null, failureFn = null;
        const runner = {
          withSuccessHandler(fn){ successFn = fn; return runner; },
          withFailureHandler(fn){ failureFn = fn; return runner; }
        };
        // ใส่ทุก method จาก METHOD_ARGS ให้ runner
        Object.keys(METHOD_ARGS).forEach(method=>{
          runner[method] = function(...args){
            callApi_(method, args)
              .then(result => { if (successFn) successFn(result); })
              .catch(err => {
                console.error("[api] " + method + " failed:", err);
                if (failureFn) failureFn(err);
              });
            return runner;
          };
        });
        return runner;
      }
      // ทุกครั้งที่อ้าง google.script.run ให้สร้าง runner ใหม่ (กัน handler ค้างข้ามครั้ง)
      return new Proxy({}, { get(_, prop){ return makeRunner()[prop]; } });
    })()
  }
};

// ✅ LIFF login อยู่ในหน้านี้เลย (ไม่ต้องมี backend.html แยกอีก)
async function bootLiff(){
  try{
    await liff.init({ liffId: _liffId, withLoginOnExternalBrowser: true });

    if (!liff.isLoggedIn()){
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile = await liff.getProfile();
    const decoded = (liff.getDecodedIDToken && liff.getDecodedIDToken()) || {};
    const uid = decoded.sub || profile.userId || "";
    window.__RESOLVED_UID__ = uid; // เก็บ uid ที่ login ได้ ให้ทั้งระบบใช้

    // log การเข้าใช้งาน (ไม่บล็อกการโหลด)
    if (uid){
      callApi_("logLiff", [uid, profile.displayName || "", profile.pictureUrl || ""])
        .catch(()=>{});
    }

    loadStructure();

  }catch(err){
    console.error("LIFF error:", err);
    // ถ้า LIFF ล้มเหลว ยังลองโหลด structure (จะติด auth เองถ้าไม่มี uid)
    loadStructure();
  }
}

// ✅ สร้าง custom dropdown เลือกทีม (แสดงรูป thumbnail หน้าชื่อ)
function buildTeamDropdown(){
  const wrap = document.createElement("div");
  wrap.className = "team-dropdown";
  wrap.id = "teamDropdownWrap";

  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "team-dropdown-btn";
  btn.id = "teamDropdownBtn";

  const list = document.createElement("div");
  list.className = "team-dropdown-list";
  list.id = "teamDropdownList";
  list.style.display = "none";

  btn.onclick = (e)=>{
    e.stopPropagation();
    const isOpening = list.style.display === "none" || !list.style.display;
    if (isOpening){
      list.style.display = "block";
      positionTeamDropdownList(btn, list);
    }else{
      list.style.display = "none";
    }
  };

  wrap.appendChild(btn);
  wrap.appendChild(list);

  // ปิด dropdown เมื่อคลิกนอกกล่อง (ผูก event แค่ครั้งเดียวต่อการเปิดตาราง)
  document.addEventListener("click", (e)=>{
    if (!wrap.contains(e.target)) list.style.display = "none";
  });
  // ปิด dropdown เมื่อเลื่อนจอ/ปรับขนาดจอ กันตำแหน่งเพี้ยนค้าง
  window.addEventListener("scroll", ()=>{ list.style.display = "none"; }, true);
  window.addEventListener("resize", ()=>{ list.style.display = "none"; });

  renderTeamDropdownList();
  return wrap;
}

// ✅ คำนวณตำแหน่ง dropdown ทีม ให้อยู่ในขอบจอเสมอ (กันล้นขวา/ล้นล่างจนต้องเลื่อนดู)
function positionTeamDropdownList(btn, list){
  const rect = btn.getBoundingClientRect();
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // ให้กว้างอย่างน้อยเท่าปุ่ม แต่ไม่เกินขอบจอ
  list.style.minWidth = Math.min(Math.max(rect.width, 200), vw - 16) + "px";

  const listWidth = list.offsetWidth || 200;
  let left = rect.left;
  if (left + listWidth > vw - 8) left = vw - listWidth - 8; // ล้นขวา → ดันเข้ามา
  if (left < 8) left = 8; // ล้นซ้าย → ดันเข้ามา

  let top = rect.bottom + 4;
  const listHeight = Math.min(list.scrollHeight || 280, 280);
  if (top + listHeight > vh - 8){ // ล้นล่าง → โผล่เหนือปุ่มแทน
    top = Math.max(8, rect.top - 4 - listHeight);
  }

  list.style.left = left + "px";
  list.style.top = top + "px";
}

// ✅ วาดรายการตัวเลือกในทีม dropdown ใหม่ (เรียกซ้ำได้เมื่อรูป/จำนวนอัพเดท โดยไม่รีเซ็ตช่องค้นหา)
function renderTeamDropdownList(){
  const btn = document.getElementById("teamDropdownBtn");
  const list = document.getElementById("teamDropdownList");
  if (!btn || !list) return;

  // ✅ ก่อนโหลดข้อมูลครั้งแรก (ยังไม่มี _teamCounts) ให้แสดงทีมทั้งหมดไปก่อน
  // หลังจากนั้นให้กรองเฉพาะทีมที่ "มีข้อมูลจริงในเดือน/ตัวกรองปัจจุบัน" เท่านั้น
  // (ทีมที่นับได้ 0 แปลว่าไม่มีรายการในเดือนนี้ ไม่ควรโชว์ให้เลือก)
  const hasCounts = _teamCounts && Object.keys(_teamCounts).length > 0;
  const visibleTeams = (_availableTeams || []).filter(v => !hasCounts || (_teamCounts[v] || 0) > 0);

  const options = [{ value:"", label:"ทั้งหมด" }]
    .concat(visibleTeams.map(v => ({ value:v, label:v })));

  // ปุ่มหลัก (ค่าที่เลือกอยู่)
  const current = options.find(o => o.value === _selectedTeam) || options[0];
  const currentAvatar = current.value ? getTeamAvatarFor(current.value) : "";
  const currentCount = current.value ? (_teamCounts[current.value] || 0) : Object.values(_teamCounts).reduce((s,n)=>s+n,0);
  btn.innerHTML = `
    ${currentAvatar ? `<img class="team-dropdown-avatar" src="${escapeHtml(currentAvatar)}" onerror="this.style.display='none'">` : ""}
    <span>${escapeHtml(current.label)}${hasCounts ? ` (${currentCount})` : ""}</span>
    <span class="caret">▾</span>
  `;

  // รายการตัวเลือก
  list.innerHTML = "";
  options.forEach(o=>{
    const item = document.createElement("div");
    item.className = "team-dropdown-item" + (o.value === _selectedTeam ? " active" : "") + (o.value === UNASSIGNED_TEAM_LABEL ? " unassigned" : "");
    const count = o.value ? (_teamCounts[o.value] || 0) : Object.values(_teamCounts).reduce((s,n)=>s+n,0);
    const avatar = o.value ? getTeamAvatarFor(o.value) : "";
    item.innerHTML = `
      ${avatar ? `<img src="${escapeHtml(avatar)}" onerror="this.style.display='none'">` : `<span style="width:20px;display:inline-block;"></span>`}
      <span>${escapeHtml(o.label)}</span>
      ${hasCounts ? `<span class="count">${count}</span>` : ""}
    `;
    item.onclick = ()=>{
      _selectedTeam = o.value;
      list.style.display = "none";
      renderTeamDropdownList();
      loadData(_selectedMonth, _selectedTeam);
    };
    list.appendChild(item);
  });
}

function showTable(d){
  console.log("getData response:", d);
  
  _currentData = d;
  const tz = document.getElementById("tableZone");
  
  if (!d || !d.rows || !d.rows.length){
    tz.innerHTML = "<div class='loading'>ไม่มีข้อมูล</div>";
    updateDropdownCounts(d.monthCounts || {}, d.teamCounts || {});
    renderAmountSummary(0);
    return;
  }

  updateDropdownCounts(d.monthCounts || {}, d.teamCounts || {});

  google.script.run
    .withSuccessHandler(amountColIdx => {
      let totalAmount = 0;
      
      if (amountColIdx >= 0){
        google.script.run
          .withSuccessHandler(structureData => {
            const amountColLetter = structureData.amountCol;
            if (!amountColLetter) {
              renderAmountSummary(0);
              return;
            }
            
            const realColIdx = letterToIndexSafe(amountColLetter);
            const showIdx = structureData.showIdx || [];
            const displayIdx = showIdx.indexOf(realColIdx);
            
            if (displayIdx >= 0 && d.rows){
              d.rows.forEach(row => {
                const amountValue = row[displayIdx];
                if (amountValue){
                  const cleaned = String(amountValue).replace(/,/g, '').replace(/[^\d.-]/g, '');
                  const num = parseFloat(cleaned) || 0;
                  totalAmount += num;
                }
              });
            }
            
            renderAmountSummary(totalAmount);
          })
          .getStructureInfo(_structureRowSelected, UID);
      } else {
        renderAmountSummary(0);
      }
    })
    .getAmountColIndex(_structureRowSelected, UID);

  _sortColumn = -1;
  _sortDirection = "asc";
  
  renderTable(d);
}

// ✅ ป้องกัน XSS: escape ค่าก่อนแทรกลง innerHTML
function escapeHtml(str){
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function renderTable(d){
  hideCellPopup(); // ✅ กันแสดง popup ค้างจากการ render ครั้งก่อน
  const tz = document.getElementById("tableZone");
  const picIndices = d.pictureIndices || [];
  const orderNoIdx = d.orderNoColIndex !== undefined ? d.orderNoColIndex : -1;
  const checkIdx = d.checkColIndex !== undefined ? d.checkColIndex : -1;
  const amountIdx = d.amountColIndex !== undefined ? d.amountColIndex : -1;
  const flexMap = d.flexMap || {}; // ✅ order_no → share_url (จากชีต FLEX)
  
  console.log("Column indices:", { orderNoIdx, checkIdx, amountIdx });
  
  let filteredRows = d.rows;
  let rowMapping = d.rows.map((_, idx) => idx);
  
  if (_searchTerm.trim()){
    const term = _searchTerm.toLowerCase();
    const filtered = [];
    const mapping = [];
    
    d.rows.forEach((r, idx) => {
      const searchText = r.join(" ").toLowerCase();
      if (searchText.includes(term)){
        filtered.push(r);
        mapping.push(idx);
      }
    });
    
    filteredRows = filtered;
    rowMapping = mapping;
  }
  
  if (_sortColumn >= 0 && _sortColumn < d.headers.length){
    const sorted = filteredRows.map((row, idx) => ({ 
      row, 
      originalIdx: rowMapping[idx] 
    }));
    
    sorted.sort((a, b) => {
      let valA = a.row[_sortColumn] || "";
      let valB = b.row[_sortColumn] || "";
      
      const numA = parseFloat(String(valA).replace(/,/g, '').replace(/[^\d.-]/g, ''));
      const numB = parseFloat(String(valB).replace(/,/g, '').replace(/[^\d.-]/g, ''));
      
      if (!isNaN(numA) && !isNaN(numB)){
        return _sortDirection === "asc" ? numA - numB : numB - numA;
      }
      
      valA = String(valA).toLowerCase();
      valB = String(valB).toLowerCase();
      
      if (valA < valB) return _sortDirection === "asc" ? -1 : 1;
      if (valA > valB) return _sortDirection === "asc" ? 1 : -1;
      return 0;
    });
    
    filteredRows = sorted.map(s => s.row);
    rowMapping = sorted.map(s => s.originalIdx);
  }
  
  let html = "<table><thead><tr><th>#</th>";
  
  d.headers.forEach((h, idx) => {
    const sortClass = _sortColumn === idx ? `sorted-${_sortDirection}` : '';
    html += `<th class="${sortClass}" onclick="sortTable(${idx})">
      ${escapeHtml(h)}
      <span class="sort-icon"></span>
    </th>`;
  });
  html += "</tr></thead><tbody>";

  if (filteredRows.length === 0){
    html += `<tr><td colspan="${d.headers.length + 1}" style="text-align:center;color:#6b7280;padding:40px;">ไม่พบข้อมูลที่ค้นหา</td></tr>`;
  } else {
    filteredRows.forEach((r, displayIdx) => {
      const originalIdx = rowMapping[displayIdx];
      html += "<tr>";
      html += `<td class="row-num" onclick="showDetail(${originalIdx})">${displayIdx + 1}</td>`;
      
      r.forEach((c, i) => {
        if (picIndices.includes(i) && c){
          const urls = String(c).split("|").map(u => u.trim()).filter(Boolean);
          html += `<td style="display:flex;gap:4px;flex-wrap:wrap;">`;
          urls.forEach(url => {
            html += `<img class="thumb" src="${escapeHtml(url)}" onclick="event.stopPropagation();openLB('${encodeURIComponent(url)}')">`;
          });
          html += `</td>`;
        }
        else if (i === amountIdx && amountIdx >= 0){
          const cleaned = String(c || "").replace(/,/g, '').replace(/[^\d.-]/g, '');
          const num = parseFloat(cleaned);
          
          if (!isNaN(num) && num !== 0){
            const formatted = num.toLocaleString('en-US', {
              minimumFractionDigits: 2,
              maximumFractionDigits: 2
            });
            html += `<td>💰 ${formatted}</td>`;
          }else{
            html += `<td>${escapeHtml(c ?? "")}</td>`;
          }
        }
        else if (i === orderNoIdx && orderNoIdx >= 0){
          // ✅ order_no: เพิ่มไอคอน LINE นำหน้า ถ้า order_no นี้มี share_url ใน FLEX
          const orderNoRaw = String(c ?? "").trim();
          const shareUrl = flexMap[orderNoRaw] || "";
          let cellContent = escapeHtml(c ?? "");

          // สร้างไอคอน LINE (แสดงเฉพาะเมื่อเจอ share_url ที่ตรงกัน)
          let lineIcon = "";
          if (shareUrl){
            lineIcon = `<i class="fa-brands fa-line order-line-icon" title="ดู FLEX message" onclick="event.stopPropagation(); openFlexPopup('${encodeURIComponent(shareUrl)}')"></i> `;
          }

          // สีตามสถานะ Check (ถ้ามี Check column)
          const checkValue = (checkIdx >= 0) ? String(r[checkIdx] || "").trim() : "";
          let style = "";
          let prefix = "";
          if (checkValue === "✅"){ style = "color:#10b981;font-weight:600;"; prefix = "✓ "; }
          else if (checkValue.startsWith("❌")){ style = "color:#dc2626;text-decoration:line-through;"; prefix = "✕ "; }
          else if (checkValue.includes("รอตรวจ")){ style = "color:#f59e0b;"; prefix = "⏱ "; }

          html += `<td style="${style}white-space:nowrap;">${lineIcon}${prefix}${cellContent}</td>`;
        }
        else {
          // ✅ จำกัดความกว้างคอลัมน์ข้อความยาว + ไอคอน Font Awesome บอกว่ามีข้อความซ่อน + คลิกดูเต็ม (escape กัน XSS)
          const safeVal = escapeHtml(c ?? "");
          html += `<td><span class="cell-truncate" onclick="handleCellClick(event, this)" data-full="${safeVal}"><span class="cell-text">${safeVal}</span><i class="fa-solid fa-circle-info cell-more-icon"></i></span></td>`;
        }
      });
      html += "</tr>";
    });
  }

  html += "</tbody></table>";
  tz.innerHTML = html;

  // ✅ วัดว่าคอลัมน์ไหนถูกตัดจริง (ล้นพื้นที่) แล้วค่อยโชว์ไอคอน "มีข้อความซ่อน"
  attachCellTruncateHandlers();
}

// ✅ ตรวจสอบทุก cell ที่ถูกจำกัดความกว้าง ว่าเนื้อหาล้นจริงไหม ถ้าล้นให้โชว์ไอคอนคลิกดูเต็ม
function attachCellTruncateHandlers(){
  document.querySelectorAll("#tableZone .cell-truncate").forEach(el=>{
    const textEl = el.querySelector(".cell-text");
    if (!textEl) return;
    const isOverflowing = textEl.scrollWidth > textEl.clientWidth + 1;
    el.classList.toggle("has-more", isOverflowing);
  });
}

// ✅ คลิกที่ cell ที่มีข้อความถูกตัด → เปิด popup แสดงข้อความเต็ม (คัดลอกได้ ปิดง่าย)
function handleCellClick(event, el){
  if (!el.classList.contains("has-more")) return; // ไม่ได้ถูกตัด ไม่ต้องทำอะไร
  event.stopPropagation();
  const fullText = el.getAttribute("data-full") || "";
  const rect = el.getBoundingClientRect();
  showCellPopup(rect, fullText);
}

// ✅ สร้าง/แสดง popup ข้อความเต็ม พร้อมปุ่มคัดลอกและปิด
let _cellPopupEl = null;
function ensureCellPopup(){
  if (_cellPopupEl) return _cellPopupEl;
  const el = document.createElement("div");
  el.className = "cell-popup";
  el.innerHTML = `
    <div class="cell-popup-text"></div>
    <div class="cell-popup-actions">
      <button type="button" class="btn-copy"><i class="fa-regular fa-copy"></i> คัดลอก</button>
      <button type="button" class="btn-close-popup"><i class="fa-solid fa-xmark"></i> ปิด</button>
    </div>
  `;
  document.body.appendChild(el);
  el.querySelector(".btn-close-popup").onclick = ()=> hideCellPopup();
  el.querySelector(".btn-copy").onclick = (e)=>{
    const text = el.querySelector(".cell-popup-text").textContent;
    copyTextToClipboard(text);
    const btn = e.currentTarget;
    const original = btn.innerHTML;
    btn.innerHTML = `<i class="fa-solid fa-check"></i> คัดลอกแล้ว`;
    setTimeout(()=>{ btn.innerHTML = original; }, 1500);
  };
  // คลิกนอกกล่อง = ปิด
  document.addEventListener("click", (e)=>{
    if (_cellPopupEl && _cellPopupEl.style.display === "block" && !_cellPopupEl.contains(e.target)){
      hideCellPopup();
    }
  });
  // กด Esc = ปิด
  document.addEventListener("keydown", (e)=>{
    if (e.key === "Escape"){ hideCellPopup(); closeFlexPopup(); }
  });
  _cellPopupEl = el;
  return el;
}

function showCellPopup(anchorRect, text){
  const el = ensureCellPopup();
  el.querySelector(".cell-popup-text").textContent = text;
  el.style.display = "block";

  // จัดตำแหน่งให้อยู่ใกล้ cell ที่คลิก และไม่ล้นจอ
  const popupWidth = Math.min(360, window.innerWidth * 0.86);
  let left = anchorRect.left;
  let top = anchorRect.bottom + 6;
  if (left + popupWidth > window.innerWidth - 8) left = window.innerWidth - popupWidth - 8;
  if (left < 8) left = 8;
  if (top + 160 > window.innerHeight){ // ถ้าล้นด้านล่าง ให้โชว์เหนือ cell แทน
    top = Math.max(8, anchorRect.top - 6 - 160);
  }
  el.style.left = left + "px";
  el.style.top = top + "px";
  el.style.width = popupWidth + "px";
}

function hideCellPopup(){
  if (_cellPopupEl) _cellPopupEl.style.display = "none";
}

// ✅ คัดลอกข้อความ รองรับทั้งเบราว์เซอร์ใหม่และเก่า/webview ของ LIFF
function copyTextToClipboard(text){
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=> fallbackCopy(text));
  }else{
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); }catch(e){ console.error("copy fallback failed", e); }
  document.body.removeChild(ta);
}

// ✅ Helper function สำหรับ frontend
function letterToIndexSafe(L){
  const s = String(L||"").trim().toUpperCase();
  if (!/^[A-Z]+$/.test(s)) return -1;
  let result = 0;
  for(let i = 0; i < s.length; i++){
    result = result * 26 + (s.charCodeAt(i) - 64);
  }
  return result - 1;
}

function renderEditForm(data, rowIdx){
  _editData = data;
  _editData.originalRowIndex = rowIdx;
  
  let html = "";
  
  data.fields.forEach(field => {
    const isLocked = field.locked;
    
    html += `<div class="edit-field ${isLocked ? 'locked' : ''}">`;
    html += `<label>${escapeHtml(field.header)}</label>`;
    
    if (field.type === "team"){
      html += `<select id="field_${field.colIndex}" ${isLocked ? 'disabled' : ''}>`;
      html += `<option value="">-- เลือกทีม --</option>`;
      data.teamList.forEach(team => {
        const selected = field.value === team.value ? 'selected' : '';
        html += `<option value="${escapeHtml(team.value)}" data-picture="${escapeHtml(team.picture)}" ${selected}>${escapeHtml(team.label)}</option>`;
      });
      html += `</select>`;
      
      const currentTeam = data.teamList.find(t => t.value === field.value);
      if (currentTeam && currentTeam.picture){
        html += `<img src="${escapeHtml(currentTeam.picture)}" class="preview" id="team_preview_${field.colIndex}">`;
      }
      
    } else if (field.type === "check"){
      const [status, remark] = field.value.split("|").map(s => s.trim());
      
      html += `<select id="field_${field.colIndex}" ${isLocked ? 'disabled' : ''} onchange="toggleRemarkField(${field.colIndex})">`;
      
      const isEmpty = !status || status === "";
      html += `<option value="" ${isEmpty ? 'selected' : ''}>-- ไม่ระบุ --</option>`;
      
      data.checkOptions.forEach(opt => {
        const selected = status === opt ? 'selected' : '';
        html += `<option value="${escapeHtml(opt)}" ${selected}>${escapeHtml(opt)}</option>`;
      });
      html += `</select>`;
      
      const showRemark = status === "❌";
      html += `<div class="check-remark" id="remark_${field.colIndex}" style="display:${showRemark ? 'block' : 'none'}">`;
      html += `<input type="text" id="remark_text_${field.colIndex}" placeholder="ระบุหมายเหตุ..." value="${escapeHtml(remark || '')}" ${isLocked ? 'readonly' : ''}>`;
      html += `</div>`;
      
    } else if (field.type === "amount"){
      const numValue = parseFloat(field.value.replace(/,/g, '')) || 0;
      html += `<input type="number" id="field_${field.colIndex}" value="${numValue}" step="0.01" ${isLocked ? 'readonly' : ''}>`;
      
    } else {
      // ✅ แก้ไขส่วนนี้: แยก URL ภาพ
      if (field.locked && field.value.includes("http")){
        const urls = field.value.split("|").map(u => u.trim()).filter(Boolean);
        urls.forEach(url => {
          html += `<img src="${escapeHtml(url)}" class="preview" style="margin-right:8px;">`;
        });
      } else {
        html += `<input type="text" id="field_${field.colIndex}" value="${escapeHtml(field.value)}" ${isLocked ? 'readonly' : ''}>`;
      }
    }
    
    html += `</div>`;
  });
  
  document.getElementById("editBody").innerHTML = html;
  
  // Event listener สำหรับ Team dropdown
  data.fields.forEach(field => {
    if (field.type === "team"){
      const select = document.getElementById(`field_${field.colIndex}`);
      if (select){
        select.addEventListener("change", function(){
          const selectedOption = this.options[this.selectedIndex];
          const picture = selectedOption.getAttribute("data-picture");
          const preview = document.getElementById(`team_preview_${field.colIndex}`);
          
          if (preview){
            if (picture){
              preview.src = picture;
              preview.style.display = "block";
            } else {
              preview.style.display = "none";
            }
          } else if (picture){
            const img = document.createElement("img");
            img.src = picture;
            img.className = "preview";
            img.id = `team_preview_${field.colIndex}`;
            select.parentElement.appendChild(img);
          }
        });
      }
    }
  });
}
// Toggle หมายเหตุเมื่อเลือก ❌
function toggleRemarkField(colIndex){
  const select = document.getElementById(`field_${colIndex}`);
  const remarkDiv = document.getElementById(`remark_${colIndex}`);
  
  if (select && remarkDiv){
    remarkDiv.style.display = select.value === "❌" ? "block" : "none";
  }
}

// บันทึกการแก้ไข
function saveEdit(){
  if (!_editData) return;
  
  const updates = {};
  
  _editData.fields.forEach(field => {
    if (field.locked) return; // ข้ามฟิลด์ที่ล็อค
    
    const input = document.getElementById(`field_${field.colIndex}`);
    if (!input) return;
    
    let newValue = "";
    
    if (field.type === "check"){
      const status = input.value;
      const remarkInput = document.getElementById(`remark_text_${field.colIndex}`);
      const remark = remarkInput ? remarkInput.value.trim() : "";
      
      newValue = status;
      if (status === "❌" && remark){
        newValue = `${status} | ${remark}`;
      }
      
    } else if (field.type === "amount"){
      const num = parseFloat(input.value) || 0;
      newValue = num; // ✅ ส่งเป็นตัวเลขธรรมดา backend จะ format เอง
      
    } else {
      newValue = input.value;
    }
    
    // เก็บเฉพาะที่เปลี่ยนแปลง
    const originalValue = field.value.replace(/,/g, ''); // เอา comma ออกก่อนเทียบ
    const newValueStr = String(newValue).replace(/,/g, '');
    
    if (newValueStr !== originalValue){
      updates[field.colIndex] = {
        value: newValue,
        type: field.type // ✅ ส่ง type ไปด้วย
      };
    }
  });
  
  if (Object.keys(updates).length === 0){
    alert("ℹ️ ไม่มีการเปลี่ยนแปลงข้อมูล");
    return;
  }
  
  console.log("Saving updates:", updates);
  
  const saveBtn = document.querySelector(".btn-save");
  saveBtn.disabled = true;
  saveBtn.textContent = "⏳ กำลังบันทึก...";

  // ✅ ตัวกันปุ่มค้าง: ถ้าบันทึกนานเกิน 20 วิ (เช่นเน็ตช้า/หลุด) ให้คืนปุ่มกลับมาใช้ได้พร้อมแจ้งเตือน
  let _saveSettled = false;
  const saveWatchdog = setTimeout(()=>{
    if (_saveSettled) return;
    _saveSettled = true;
    saveBtn.disabled = false;
    saveBtn.textContent = "💾 บันทึก";
    alert("⚠️ การบันทึกใช้เวลานานผิดปกติ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่อีกครั้ง");
  }, 20000);
  
  google.script.run
    .withSuccessHandler(result => {
      if (_saveSettled) return; // watchdog ทำงานไปแล้ว ไม่ต้องทำซ้ำ
      _saveSettled = true;
      clearTimeout(saveWatchdog);

      saveBtn.disabled = false;
      saveBtn.textContent = "💾 บันทึก";
      
      if (result.success){
        alert("✅ บันทึกสำเร็จ!" + (result.savedAt ? `\nเวลาบันทึก: ${result.savedAt}` : ""));
        closeEditModal();
        // ✅ Reload ข้อมูลใหม่
        loadData(_selectedMonth, _selectedTeam);
      } else {
        alert("❌ " + (result.error || "ไม่สามารถบันทึกได้"));
      }
    })
    .withFailureHandler(err => {
      if (_saveSettled) return;
      _saveSettled = true;
      clearTimeout(saveWatchdog);

      saveBtn.disabled = false;
      saveBtn.textContent = "💾 บันทึก";
      alert("❌ เกิดข้อผิดพลาด: " + err);
    })
    .saveEditData(
      _editData.targetSheetId,
      _editData.targetSheetName,
      _editData.targetRowIndex,
      updates,
      UID
    );
}

function closeEditModal(){
  document.getElementById("editModal").style.display = "none";
  _editData = null;
} 
const DEFAULT_TEAM_AVATAR = "https://i.pinimg.com/736x/83/bc/8b/83bc8b88cf6bc4b4e04d153a418cde62.jpg";

function openDashboardDefault(){
  if (!_structureRowSelected){
    alert("กรุณาเลือกการ์ดจากหน้าแรกก่อน แล้วค่อยกด Dashboard");
    return;
  }
  // เปิดป๊อปอัพ
  document.getElementById("dashboardModal").style.display = "flex";

  // ตั้งค่าเดือนเริ่มต้น = เดือนล่าสุด
  const dashSel = document.getElementById("dashMonth");
  dashSel.innerHTML = `<option value="">ทั้งหมด</option>`;
  if (_availableMonths && _availableMonths.length){
    _availableMonths.forEach(m=>{
      const opt = document.createElement("option");
      opt.value = m.value;
      opt.textContent = m.label;
      dashSel.appendChild(opt);
    });
    dashSel.value = _availableMonths[_availableMonths.length - 1].value;
    runDashboard([dashSel.value]); // แสดงผลเดือนล่าสุดทันที
  }else{
    runDashboard([]); // ไม่มีรายการเดือน → รวมทั้งหมด
  }

  // เปลี่ยนเดือนในป๊อปอัพ -> สร้างใหม่
  dashSel.onchange = ()=>{
    const v = dashSel.value;
    const months = v ? [v] : [];
    runDashboard(months);
  };
}

function closeDashboard(){
  document.getElementById("dashboardModal").style.display = "none";
}

function runDashboard(months){
  const body = document.getElementById("dashBody");
  body.innerHTML = '<div class="loading">⏳ สร้างแดชบอร์ด...</div>';

  google.script.run
    .withSuccessHandler(async d => {
      // ดึงรูปทีมจาก TEAM sheet
      google.script.run
        .withSuccessHandler(teamList=>{
          renderDashboard(d, teamList || []);
        })
        .withFailureHandler(err=>{
          console.error("getTeamList fail:", err);
          renderDashboard(d, []); // เรนเดอร์ต่อได้ โดยไม่มีรูป
        })
        .getTeamList();
    })
    .withFailureHandler(err => {
      console.error(err);
      body.innerHTML = `<div class="loading" style="color:#dc2626">❌ ${err}</div>`;
    })
    .getDashboardData(_structureRowSelected, months || [], UID);
}

function renderDashboard(d, teamList){
  const body = document.getElementById("dashBody");
  if (!d || d.error){
    body.innerHTML = `<div class="loading" style="color:#dc2626">❌ ${escapeHtml(d?.error || "ไม่สามารถสร้างแดชบอร์ดได้")}</div>`;
    return;
  }

  // ===== สรุปบนสุด
  const fmt  = (n)=> (Number(n)||0).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
  const fmt0 = (n)=> (Number(n)||0).toLocaleString('th-TH');

  let html = `
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px">
    <div class="amount-summary"><div class="icon">💰</div><div class="content">
      <div class="label">ยอดรวม (${escapeHtml(d.monthsLabel)})</div>
      <div class="value">${fmt(d.totalAmount)} บาท</div>
    </div></div>
    <div class="amount-summary" style="background:linear-gradient(135deg,#34d399,#10b981)">
      <div class="icon">🧾</div><div class="content">
        <div class="label">จำนวนรายการ</div>
        <div class="value">${fmt0(d.totalCount)} รายการ</div>
      </div>
    </div>
  </div>`;

  // ===== กราฟยอดตามเดือน (bar แบบง่าย)
  if (d.byMonth && d.byMonth.length){
    const maxAmt = Math.max(...d.byMonth.map(x=>x.amount||0), 1);
    html += `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:16px">
      <div style="font-weight:700;margin-bottom:8px">ยอดตามเดือน</div>
      <div style="display:grid;gap:8px">`;
    d.byMonth.forEach(m=>{
      const w = Math.round((m.amount / maxAmt) * 100);
      html += `
        <div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280">
            <span>${escapeHtml(m.label)}</span><span>${fmt(m.amount)} บาท</span>
          </div>
          <div style="height:10px;background:#f3f4f6;border-radius:999px;overflow:hidden">
            <div style="height:100%;width:${w}%;background:#3b82f6"></div>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  }

  // ===== อันดับทีม (การ์ด + รูป)
  const pictureMap = {};
  (teamList||[]).forEach(t=>{
    // t.value = Value, t.label = Label, t.picture = line_picture_url
    if (t && t.value){
      pictureMap[String(t.value).trim()] = t.picture || "";
    }
  });

  if (d.byTeam && d.byTeam.length){
    const maxAmtT = Math.max(...d.byTeam.map(x=>x.amount||0), 1);
    html += `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px">
      <div style="font-weight:700;margin-bottom:8px">อันดับทีม</div>
      <div class="team-grid">`;

    d.byTeam.forEach((t,i)=>{
      const teamVal = String(t.team||"").trim();    // team ที่มาจากคอลัมน์ Value
      const avatar = pictureMap[teamVal] || DEFAULT_TEAM_AVATAR;
      const barW = Math.round((t.amount / maxAmtT) * 100);

      html += `
      <div class="team-card">
        <img src="${escapeHtml(avatar)}" onerror="this.src='${DEFAULT_TEAM_AVATAR}'" alt="">
        <div class="team-meta">
          <div class="name">#${i+1} ${escapeHtml(teamVal || "-")}</div>
          <div class="sub">รายการ: ${fmt0(t.count)} | ยอดรวม: ${fmt(t.amount)} บาท</div>
          <div class="team-bar"><div class="fill" style="width:${barW}%"></div></div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  }

  body.innerHTML = html;
}



</script>
</body>
</html>
