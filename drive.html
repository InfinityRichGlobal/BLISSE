<style>
  :root{
    --bg:#ffffff; --text:#171717; --border:#f0f0f0; --thumb-h:160px;
  }
  body{ font-family:'Prompt',sans-serif; background:var(--bg); color:var(--text); }
  .card-clean{ transition:all .3s ease; border:1px solid var(--border); }
  .card-clean:hover{ transform:translateY(-3px); box-shadow:0 12px 30px -8px rgba(0,0,0,.08); }
  .loader{ border:2px solid #f3f3f3; border-top:2px solid var(--text); border-radius:50%; width:24px; height:24px; animation:spin 1s linear infinite; }
  @keyframes spin{ 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
  #lightbox{ backdrop-filter:blur(6px); }
  .pill{ transition:all .2s ease; }
  .pill.active{ background:var(--text); color:#fff; }
  .gallery{ display:flex; flex-wrap:wrap; }
  .gitem{ margin:2px; position:relative; overflow:hidden; border-radius:.75rem; cursor:pointer; background:#fafafa; border:1px solid rgba(0,0,0,.07); }
  .gitem img,.gitem video{ height:100%; width:auto; display:block; }
  .gitem .overlay{ position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.55), transparent 40%); opacity:0; transition:opacity .2s; pointer-events:none; }
  .gitem:hover .overlay{ opacity:1; }
  .gitem .meta{ position:absolute; bottom:6px; left:8px; right:8px; color:#fff; font-size:11px; opacity:0; transition:opacity .2s; display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .gitem:hover .meta{ opacity:1; }
  .toast{ animation:slideIn .3s ease; }
  @keyframes slideIn{ from{transform:translateX(120%)} to{transform:translateX(0)} }
  .progress-row{ display:flex; align-items:center; gap:.75rem; padding:.5rem .75rem; border-bottom:1px solid var(--border); }
  ::-webkit-scrollbar{ width:6px; height:6px; }
  ::-webkit-scrollbar-thumb{ background:#ddd; border-radius:10px; }
</style>
</head>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwElaS5cdJ5L3yLLfksKvPDo3NHtkjqa2DFGHzbMdkUMRUTZLR4R6gjD5pn2nVF4wiF/exec";

// placeholder ตอนโหลดรูปไม่ขึ้น — สร้างในเครื่องเลย ไม่พึ่ง service ภายนอกที่อาจล่ม/บล็อก
const FALLBACK_THUMB = "data:image/svg+xml;utf8," + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220"><rect width="100%" height="100%" fill="#f0f0f0"/><text x="50%" y="50%" font-family="sans-serif" font-size="13" fill="#bbb" text-anchor="middle" dy=".3em">โหลดไม่ขึ้น</text></svg>'
);
const FALLBACK_VIDEO_PROCESSING = "data:image/svg+xml;utf8," + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220"><rect width="100%" height="100%" fill="#1a1a1a"/><circle cx="110" cy="95" r="26" fill="#fff" opacity="0.9"/><polygon points="102,82 102,108 126,95" fill="#1a1a1a"/><text x="50%" y="150" font-family="sans-serif" font-size="12" fill="#ccc" text-anchor="middle">Drive กำลังสร้างพรีวิว...</text></svg>'
);
const FALLBACK_LOADING = "data:image/svg+xml;utf8," + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="220" height="220"><rect width="100%" height="100%" fill="#f5f5f5"/><text x="50%" y="50%" font-family="sans-serif" font-size="12" fill="#ccc" text-anchor="middle" dy=".3em">กำลังโหลด...</text></svg>'
);

// Drive อาจใช้เวลาสักครู่กว่าจะสร้างลิงก์พรีวิวให้ไฟล์ที่เพิ่งอัปโหลด/ซิงค์มา
// (เกิดได้ทั้งภาพและวีดีโอ) — ลอง retry อัตโนมัติก่อนค่อย fallback เป็นไอคอนถาวร
function handleThumbError(imgEl, isVideo){
  const retryCount = parseInt(imgEl.dataset.retry || '0');
  if(retryCount < 3){
    imgEl.dataset.retry = retryCount + 1;
    imgEl.src = isVideo ? FALLBACK_VIDEO_PROCESSING : FALLBACK_LOADING;
    setTimeout(()=>{
      const original = imgEl.dataset.original;
      if(!original) return;
      const sep = original.includes('?') ? '&' : '?';
      imgEl.src = original + sep + '_r=' + Date.now(); // cache-bust ลองโหลดใหม่
    }, 2000 * (retryCount + 1));
  } else {
    imgEl.onerror = null;
    imgEl.src = isVideo ? FALLBACK_VIDEO_PROCESSING : FALLBACK_THUMB;
  }
}

let STATE = {
  uid: null, profile: null, role: null, approved: false,
  config: {}, tags: [], files: [], showCounts: false,
  activeType: 'all', activeTags: new Set(), untaggedOnly: false, hiddenOnly: false, currentSet: [], lightboxIndex: 0
};

// ---------------- LIFF BOOTSTRAP ----------------
async function boot(){
  document.getElementById('loading-state').classList.remove('hidden');
  document.getElementById('gallery').innerHTML = '';
  document.getElementById('pending-state').classList.add('hidden');
  document.getElementById('filter-bar').classList.add('hidden');

  // 1) โหลด config แบบ public ก่อน (ยังไม่ต้อง login)
  const pre = await api('bootstrap');
  applyTheme(pre.config);

  // 2) LIFF init + login
  try{
    await liff.init({ liffId: pre.config.liff_channel_id });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const profile = await liff.getProfile();
    STATE.uid = profile.userId; STATE.profile = profile;
    await api('log', { uid: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl }, true);
  }catch(err){
    console.error('LIFF error', err);
  }

  // 3) โหลดข้อมูลจริงตามสิทธิ์
  const data = await api('bootstrap', { uid: STATE.uid });
  STATE.role = data.role; STATE.approved = data.approved;
  STATE.config = data.config; STATE.tags = data.tags; STATE.files = data.files;
  STATE.showCounts = data.showCounts;
  applyTheme(data.config);

  document.getElementById('loading-state').classList.add('hidden');

  if(!STATE.approved){
    document.getElementById('pending-state').classList.remove('hidden');
    return;
  }
  if(STATE.role === 'admin'){
    document.getElementById('admin-buttons').style.display = 'flex';
    updateShortcutToggleBtn();
  }

  document.getElementById('filter-bar').classList.remove('hidden');
  renderFilters();
  applyFilters();
}

function applyTheme(cfg){
  const root = document.documentElement.style;
  if(cfg.theme_bg_color) root.setProperty('--bg', cfg.theme_bg_color);
  if(cfg.theme_text_color) root.setProperty('--text', cfg.theme_text_color);
  if(cfg.theme_border_color) root.setProperty('--border', cfg.theme_border_color);
  if(cfg.thumbnail_height_px) root.setProperty('--thumb-h', cfg.thumbnail_height_px+'px');
  document.getElementById('header-title').textContent = cfg.header_text || 'Blissé Exclusive Storage';
  document.getElementById('header-sub').textContent = cfg.subhead_text || '';
  const logoBox = document.getElementById('logo-box');
  if(cfg.logo_url){
    const img = `<img src="${cfg.logo_url}" class="w-full h-full object-contain">`;
    logoBox.innerHTML = cfg.link_logo ? `<a href="${cfg.link_logo}" target="_blank" class="w-full h-full block">${img}</a>` : img;
  }
}

// ---------------- API ----------------
async function api(action, payload, isPost){
  if(isPost || payload && Object.keys(payload).length){
    // ใช้ POST เมื่อมี body action ที่ไม่ใช่ read-only bootstrap
  }
  if(action === 'bootstrap' || action === 'pendingUsers'){
    const uid = (payload && payload.uid) || '';
    const res = await fetch(`${API_URL}?action=${action}&uid=${encodeURIComponent(uid)}`);
    return res.json();
  }
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(Object.assign({ action, uid: STATE.uid }, payload || {}))
  });
  return res.json();
}

// ---------------- FILTERS ----------------
function renderFilters(){
  const counts = computeCounts();

  // แถวบนสุด: ฟังก์ชันเฉพาะแอดมิน (ไม่มี tag / ไฟล์ที่ซ่อนอยู่)
  const adminBar = document.getElementById('admin-filters');
  if(STATE.role === 'admin'){
    const untaggedStr = STATE.showCounts ? ` (${counts.untagged})` : '';
    const hiddenStr = STATE.showCounts ? ` (${counts.hidden})` : '';
    adminBar.innerHTML = `
      <button onclick="toggleUntagged()" class="pill px-3 py-1 rounded-full text-[11px] md:text-xs border ${STATE.untaggedOnly?'active':'border-gray-200 text-gray-500'}"><i class="fa-solid fa-tag mr-1"></i>ไม่มี tag${untaggedStr}</button>
      <button onclick="toggleHidden()" class="pill px-3 py-1 rounded-full text-[11px] md:text-xs border ${STATE.hiddenOnly?'active':'border-gray-200 text-gray-500'}"><i class="fa-solid fa-eye-slash mr-1"></i>ซ่อนอยู่${hiddenStr}</button>`;
  } else {
    adminBar.innerHTML = '';
  }

  const typeBar = document.getElementById('type-filters');
  typeBar.innerHTML = ['all','image','video'].map(t=>{
    const label = t==='all' ? 'ทั้งหมด' : (t==='image'?'<i class="fa-solid fa-image mr-1"></i>ภาพ':'<i class="fa-solid fa-video mr-1"></i>วีดีโอ');
    const n = counts.type[t] || 0;
    const countStr = STATE.showCounts ? ` (${n})` : '';
    return `<button onclick="setType('${t}')" class="pill px-4 py-1.5 rounded-full text-xs md:text-sm border ${STATE.activeType===t?'active':'border-gray-200 text-gray-600'}">${label}${countStr}</button>`;
  }).join('');

  const tagBar = document.getElementById('tag-filters');
  tagBar.innerHTML = STATE.tags.map(t=>{
    const n = counts.tags[t.tag_name] || 0;
    const active = STATE.activeTags.has(t.tag_name);
    const countStr = STATE.showCounts ? ` (${n})` : '';
    return `<button onclick="toggleTag('${t.tag_name}')" class="pill px-3 py-1 rounded-full text-[11px] md:text-xs border ${active?'active':'border-gray-200 text-gray-500'}">#${t.tag_name}${countStr}</button>`;
  }).join('');
}

function computeCounts(){
  // ชั้นฐาน: โหมด "ซ่อนอยู่" กรองก่อนทุกอย่าง — ทุกตัวเลขบนจอจะนับจากไฟล์ที่ซ่อนเท่านั้น
  // ทำให้แอดมินเห็นทันทีว่าแต่ละ tag/อัลบั้ม มีไฟล์ซ่อนอยู่กี่ไฟล์
  const base = STATE.hiddenOnly ? STATE.files.filter(f=>f.show_hide==='hide') : STATE.files;

  // cascading: type counts respect active tags; tag counts respect active type
  const byTag = base.filter(f => {
    if(STATE.untaggedOnly) return fileTags(f).length===0;
    return STATE.activeTags.size===0 || fileTags(f).some(t=>STATE.activeTags.has(t));
  });
  const byType = base.filter(f => STATE.activeType==='all' || f.file_type===STATE.activeType);

  const typeCounts = { all: byTag.length,
    image: byTag.filter(f=>f.file_type==='image').length,
    video: byTag.filter(f=>f.file_type==='video').length };

  const tagCounts = {};
  STATE.tags.forEach(t=>{
    tagCounts[t.tag_name] = byType.filter(f=>fileTags(f).includes(t.tag_name)).length;
  });
  const untaggedCount = byType.filter(f=>fileTags(f).length===0).length;
  // จำนวนไฟล์ซ่อนทั้งหมด (นับจากทุกไฟล์เสมอ ไม่ขึ้นกับโหมด เพื่อให้ปุ่มฟ้องยอดจริงตลอด)
  const hiddenCount = STATE.files.filter(f=>f.show_hide==='hide')
    .filter(f => STATE.activeType==='all' || f.file_type===STATE.activeType).length;
  return { type: typeCounts, tags: tagCounts, untagged: untaggedCount, hidden: hiddenCount };
}

function fileTags(f){ return (f.tags||'').split(',').map(s=>s.trim()).filter(Boolean); }

function setType(t){ STATE.activeType = t; renderFilters(); applyFilters(); }
function toggleTag(name){
  STATE.untaggedOnly = false; // เลือก tag ปกติ = ออกจากโหมดไม่มี tag
  STATE.activeTags.has(name) ? STATE.activeTags.delete(name) : STATE.activeTags.add(name);
  renderFilters(); applyFilters();
}
function toggleUntagged(){
  STATE.untaggedOnly = !STATE.untaggedOnly;
  if(STATE.untaggedOnly) STATE.activeTags.clear(); // โหมดไม่มี tag ใช้ร่วมกับ tag อื่นไม่ได้โดยนิยาม
  renderFilters(); applyFilters();
}
function toggleHidden(){
  // โหมดซ่อนอยู่ใช้ร่วมกับ tag ได้ (เพื่อไล่ดูไฟล์ซ่อนรายอัลบั้ม)
  STATE.hiddenOnly = !STATE.hiddenOnly;
  renderFilters(); applyFilters();
}

function applyFilters(){
  let list = STATE.files;
  if(STATE.hiddenOnly) list = list.filter(f=>f.show_hide==='hide');
  if(STATE.activeType !== 'all') list = list.filter(f=>f.file_type===STATE.activeType);
  if(STATE.untaggedOnly) list = list.filter(f=>fileTags(f).length===0);
  else if(STATE.activeTags.size>0) list = list.filter(f=>fileTags(f).some(t=>STATE.activeTags.has(t)));
  renderGallery(list);
}

// ---------------- GALLERY (ใช้ร่วมกันได้หลายจุด: หน้าแรก / sync thumbnails) ----------------
const LISTS = {}; // เก็บ list แต่ละชุดไว้ให้ lightbox อ้างอิงได้ (gallery, sync)
let currentLightboxKey = 'gallery';

function renderGallery(list){
  STATE.currentSet = list;
  renderThumbGrid('gallery', 'gallery', list);
}

function renderThumbGrid(containerId, listKey, list){
  LISTS[listKey] = list;
  const el = document.getElementById(containerId);
  if(!el) return;
  const h = parseInt(STATE.config.thumbnail_height_px) || 160;
  if(list.length===0){ el.innerHTML = `<div class="w-full text-center py-16 text-gray-300 text-sm">ไม่พบไฟล์</div>`; return; }

  el.innerHTML = list.map((f,i)=>{
    const thumb = f.file_type==='image'
      ? `https://lh3.googleusercontent.com/d/${f.file_id}`
      : `https://drive.google.com/thumbnail?id=${f.file_id}&sz=w400`;
    const hidden = f.show_hide==='hide';
    const shortcutsEnabled = String(STATE.config.show_admin_shortcuts).toLowerCase() !== 'false'; // default เปิด ถ้าไม่ได้ตั้งค่าไว้
    const hiddenBadge = hidden ? `<span class="absolute bottom-2 left-2 text-[10px] bg-black bg-opacity-60 text-white px-2 py-0.5 rounded-full z-10"><i class="fa-solid fa-eye-slash mr-1"></i>ซ่อน</span>` : '';
    const videoBadge = f.file_type==='video' ? `<span class="absolute top-1.5 right-1.5 text-[10px] bg-black bg-opacity-60 text-white w-5 h-5 rounded-full flex items-center justify-center z-10 pointer-events-none"><i class="fa-solid fa-video"></i></span>` : '';
    const adminShortcuts = (STATE.role==='admin' && shortcutsEnabled) ? `
      <button onclick="event.stopPropagation(); quickToggleShow('${f.file_id}','${hidden?'show':'hide'}')" title="${hidden?'เปิดตา':'ปิดตา'}" class="absolute top-1 left-1 w-6 h-6 rounded-full bg-black bg-opacity-50 text-white text-[10px] flex items-center justify-center hover:bg-opacity-80 z-20">
        <i class="fa-solid ${hidden?'fa-eye-slash':'fa-eye'}"></i>
      </button>
      <button onclick="event.stopPropagation(); quickDelete('${f.file_id}')" title="ลบ" class="absolute bottom-1 left-1 w-6 h-6 rounded-full bg-red-500 bg-opacity-90 text-white text-[10px] flex items-center justify-center hover:bg-red-600 z-20">
        <i class="fa-solid fa-xmark"></i>
      </button>` : '';

    return `
    <div class="gitem" style="height:${h}px" onclick="openLightboxFromList('${listKey}', ${i})">
      <img src="${thumb}" data-original="${thumb}" loading="lazy" onerror="handleThumbError(this, ${f.file_type==='video'})">
      ${adminShortcuts}
      ${hiddenBadge}
      ${videoBadge}
      <div class="overlay"></div>
      <div class="meta">
        <span class="truncate">${f.file_name || ''}</span>
        <span class="flex gap-2 shrink-0">
          <a href="${f.file_url}" target="_blank" onclick="event.stopPropagation()" title="เปิดใน Drive"><i class="fa-brands fa-google-drive"></i></a>
          <a href="https://drive.google.com/uc?export=download&id=${f.file_id}" onclick="event.stopPropagation()" title="ดาวน์โหลด"><i class="fa-solid fa-download"></i></a>
        </span>
      </div>
    </div>`;
  }).join('');
}

async function quickToggleShow(fileId, newState){
  const res = await api('bulkUpdate', { fileIds: [fileId], showHide: newState });
  if(res.error){ toast('ล้มเหลว: ' + res.error, 'err'); return; }
  toast(newState==='show' ? 'เปิดตาแล้ว' : 'ปิดตาแล้ว');
  await refreshData();
}
async function quickDelete(fileId){
  const ok = await showConfirm('ลบไฟล์นี้ออกจากระบบ? (ไฟล์จริงใน Drive จะไม่ถูกลบ)');
  if(!ok) return;
  const res = await api('deleteFiles', { fileIds: [fileId] });
  if(res.error){ toast('ลบไม่สำเร็จ: ' + res.error, 'err'); return; }
  toast('ลบไฟล์แล้ว');
  await refreshData();
}

}

// ---------------- CUSTOM CONFIRM (แทน window.confirm ที่บางเว็บวิวบล็อก) ----------------
function showConfirm(message){
  return new Promise(resolve=>{
    const modal = document.getElementById('confirm-modal');
    document.getElementById('confirm-message').textContent = message;
    modal.classList.remove('hidden'); modal.classList.add('flex');
    const okBtn = document.getElementById('confirm-ok');
    const cancelBtn = document.getElementById('confirm-cancel');
    const cleanup = (result)=>{
      modal.classList.add('hidden'); modal.classList.remove('flex');
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      resolve(result);
    };
    const onOk = ()=>cleanup(true);
    const onCancel = ()=>cleanup(false);
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
  });
}

// ---------------- LIGHTBOX (ใช้ list ไหนก็ได้ผ่าน key: gallery / sync) ----------------
function openLightboxFromList(listKey, i){
  currentLightboxKey = listKey;
  STATE.lightboxIndex = i;
  renderLightbox();
  document.getElementById('lightbox').classList.remove('hidden');
  document.getElementById('lightbox').classList.add('flex');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.add('hidden');
  document.getElementById('lightbox').classList.remove('flex');
  // ต้องล้าง iframe ออกจริงๆ ไม่ใช่แค่ซ่อนด้วย CSS เพราะวีดีโอ/เสียงข้างในจะเล่นต่อเบื้องหลัง
  document.getElementById('lightbox-content').innerHTML = '';
}
function navLightbox(dir){
  const list = LISTS[currentLightboxKey] || [];
  if(list.length===0) return;
  const len = list.length;
  STATE.lightboxIndex = (STATE.lightboxIndex + dir + len) % len;
  renderLightbox();
}
function renderLightbox(){
  const list = LISTS[currentLightboxKey] || [];
  const f = list[STATE.lightboxIndex];
  if(!f) return;
  const content = document.getElementById('lightbox-content');
  if(f.file_type==='image'){
    content.innerHTML = `<img src="https://lh3.googleusercontent.com/d/${f.file_id}" class="max-w-full rounded-2xl object-contain" style="max-height:calc(100vh - 180px)">`;
  }else{
    // ต้องใช้ iframe ของ Drive เป็นหลัก เพราะ Drive ไม่มีลิงก์สตรีมวีดีโอตรงที่ <video> เล่นได้จริง
    // (uc?export=download คืนหน้ายืนยันดาวน์โหลด ไม่ใช่ไฟล์วีดีโอดิบ)
    // ขยายกรอบให้ใหญ่ + ยืดหยุ่นทั้งแนวตั้ง/แนวนอน ให้ Drive letterbox เองได้ดีขึ้น
    content.innerHTML = `<iframe src="https://drive.google.com/file/d/${f.file_id}/preview" class="w-[92vw] max-w-[600px] rounded-2xl bg-black" style="height:calc(100vh - 180px)" allow="autoplay"></iframe>`;
  }
  document.getElementById('lb-download').href = `https://drive.google.com/uc?export=download&id=${f.file_id}`;
  document.getElementById('lb-drive').href = f.file_url;
  const fnEl = document.getElementById('lb-filename');
  if(fnEl) fnEl.textContent = f.file_name || '';

  const adminBar = document.getElementById('lb-admin-bar');
  if(adminBar){
    if(STATE.role==='admin'){
      const hidden = f.show_hide==='hide';
      adminBar.style.display = 'flex';
      adminBar.innerHTML = `
        <button onclick="quickToggleShow('${f.file_id}','${hidden?'show':'hide'}')" class="flex items-center gap-1.5 px-3.5 py-2 text-white text-xs md:text-sm rounded-xl hover:bg-white hover:bg-opacity-10 transition-colors"><i class="fa-solid ${hidden?'fa-eye-slash':'fa-eye'}"></i><span class="hidden sm:inline">${hidden?'เปิดตา':'ปิดตา'}</span></button>
        <button onclick="openLightboxTagEditor('${f.file_id}')" class="flex items-center gap-1.5 px-3.5 py-2 text-white text-xs md:text-sm rounded-xl hover:bg-white hover:bg-opacity-10 transition-colors"><i class="fa-solid fa-tags"></i><span class="hidden sm:inline">Tag</span></button>
        <button onclick="quickDelete('${f.file_id}')" class="flex items-center gap-1.5 px-3.5 py-2 text-red-300 text-xs md:text-sm rounded-xl hover:bg-white hover:bg-opacity-10 transition-colors"><i class="fa-solid fa-trash"></i><span class="hidden sm:inline">ลบ</span></button>`;
    } else {
      adminBar.style.display = 'none';
    }
  }
}
document.addEventListener('keydown', e=>{
  if(document.getElementById('lightbox').classList.contains('hidden')) return;
  if(e.key==='ArrowLeft') navLightbox(-1);
  if(e.key==='ArrowRight') navLightbox(1);
  if(e.key==='Escape') closeLightbox();
});

let tagEditorFileId = null;
let tagEditorSelected = new Set();

function openLightboxTagEditor(fileId){
  tagEditorFileId = fileId;
  const list = LISTS[currentLightboxKey] || [];
  const f = list.find(x=>x.file_id===fileId);

  renderTagEditorList();

function closeTagEditor(){
  document.getElementById('tag-editor-modal').style.display = 'none';
}
function renderTagEditorList(){
  const box = document.getElementById('tag-editor-list');
  box.innerHTML = STATE.tags.map(t=>{
    const active = tagEditorSelected.has(t.tag_name);
    return `<button onclick="toggleTagEditorChip('${t.tag_name}')" class="pill px-2.5 py-1 rounded-full text-[11px] border ${active?'active':'border-gray-200 text-gray-500'}">#${t.tag_name}</button>`;
  }).join('') || `<span class="text-[11px] text-gray-300">ยังไม่มี tag ในระบบ สร้างใหม่ด้านล่าง</span>`;
}
function toggleTagEditorChip(name){
  tagEditorSelected.has(name) ? tagEditorSelected.delete(name) : tagEditorSelected.add(name);
  renderTagEditorList();
}
async function createTagFromEditor(){
  const input = document.getElementById('tag-editor-new');
  const name = input.value.trim();
  if(!name) return;
  const res = await api('createTag', { tagName: name, visibility: '' });
  if(res.error){ toast('สร้าง tag ไม่สำเร็จ: ' + res.error, 'err'); return; }
  STATE.tags.push({ tag_name: name, visibility: '' });
  tagEditorSelected.add(name);
  input.value = '';
  renderTagEditorList();
}
async function saveTagEditor(){
  const list = LISTS[currentLightboxKey] || [];
  const f = list.find(x=>x.file_id===tagEditorFileId);
  const original = new Set(fileTags(f || {tags:''}));
  const toAdd = Array.from(tagEditorSelected).filter(t=>!original.has(t));
  const toRemove = Array.from(original).filter(t=>!tagEditorSelected.has(t));
  if(toAdd.length===0 && toRemove.length===0){ closeTagEditor(); return; }
  const res = await api('bulkUpdate', { fileIds: [tagEditorFileId], tagsToAdd: toAdd, tagsToRemove: toRemove });
  if(res.error){ toast('บันทึก tag ไม่สำเร็จ: ' + res.error, 'err'); return; }
  toast('บันทึก tag แล้ว');
  closeTagEditor();
  await refreshData();
  if(!document.getElementById('lightbox').classList.contains('hidden')){
    const newList = LISTS[currentLightboxKey] || [];
    const idx = newList.findIndex(x=>x.file_id===tagEditorFileId);
    if(idx>=0){ STATE.lightboxIndex = idx; renderLightbox(); }
  }
}

}

function addFilesToQueue(fileList){
  Array.from(fileList).forEach(file=>{
    uploadQueue.push({
      id: 'u'+Math.random().toString(36).slice(2),
      file, status: 'pending', progress: 0, error: null,
      localUrl: URL.createObjectURL(file)
    });
  });
  document.getElementById('upload-input').value = ''; // เคลียร์ input เผื่อเลือกไฟล์เดิมซ้ำได้อีก
  renderUploadQueue();
}

function removeFromQueue(id){
  uploadQueue = uploadQueue.filter(q => q.id !== id || q.status !== 'pending');
  renderUploadQueue();
}

function renderUploadQueue(){
  const box = document.getElementById('upload-progress');
  document.getElementById('queue-count').textContent = uploadQueue.filter(q=>q.status==='pending').length;
  box.innerHTML = uploadQueue.map(q=>{
    const isVideo = q.file.type.startsWith('video');
    const statusHtml = {
      pending: '<span class="text-gray-400">รอคิว</span>',
      claimed: '<span class="text-gray-400">กำลังเริ่ม...</span>',
      uploading: `<span class="text-blue-500">กำลังอัปโหลด ${q.progress}%</span>`,
      saving: '<span class="text-blue-500">กำลังบันทึกลงชีต...</span>',
      success: '<span class="text-green-600"><i class="fa-solid fa-circle-check mr-1"></i>สำเร็จ</span>',
      fail: `<span class="text-red-500"><i class="fa-solid fa-circle-xmark mr-1"></i>ล้มเหลว: ${q.error||'ไม่ทราบสาเหตุ'}</span> <button onclick="retryUploadItem('${q.id}')" class="ml-1 text-[10px] border border-gray-300 px-2 py-0.5 rounded-full hover:bg-gray-100 whitespace-nowrap"><i class="fa-solid fa-rotate-right mr-0.5"></i>ลองใหม่</button>`
    }[q.status];
    return `
    <div class="progress-row">
      ${isVideo ? `<video src="${q.localUrl}" class="w-10 h-10 rounded-lg object-cover"></video>` : `<img src="${q.localUrl}" class="w-10 h-10 rounded-lg object-cover">`}
      <div class="flex-1 min-w-0">
        <div class="truncate text-xs">${q.file.name}</div>
        <div class="w-full h-1 bg-gray-100 rounded-full mt-1 overflow-hidden">
          <div class="h-full bg-black transition-all" style="width:${q.status==='success'?100:q.progress}%"></div>
        </div>
      </div>
      <div class="text-[11px] whitespace-nowrap">${statusHtml}</div>
      ${q.status==='pending' ? `<button onclick="removeFromQueue('${q.id}')" class="text-gray-300 hover:text-red-500 text-xs">✕</button>` : ''}
    </div>`;
  }).join('');
}

const MAX_CONCURRENT_UPLOADS = 3; // อัปโหลดพร้อมกันได้สูงสุดกี่ไฟล์ (กัน Apps Script quota ชน)

function retryUploadItem(id){
  const item = uploadQueue.find(q=>q.id===id);
  if(!item || item.status!=='fail') return;
  item.status = 'pending'; item.progress = 0; item.error = null;
  renderUploadQueue();
  startUpload(); // ทำต่อคิว (จะหยิบเฉพาะ pending อัตโนมัติ ไฟล์ที่สำเร็จแล้วไม่ถูกแตะ)
}

function retryAllFailed(){
  let count = 0;
  uploadQueue.forEach(q=>{
    if(q.status==='fail'){ q.status='pending'; q.progress=0; q.error=null; count++; }
  });
  if(count===0){ toast('ไม่มีไฟล์ที่ล้มเหลว','err'); return; }
  renderUploadQueue();
  startUpload();
}

async function startUpload(){
  if(uploadRunning) return; // กันกดซ้ำซ้อน
  uploadRunning = true;
  const tags = Array.from(uploadSelectedTags).join(',');
  let success=0, fail=0;

  async function runOne(item){
    item.status = 'uploading'; item.progress = 0;
    renderUploadQueue();
    const res = await uploadFileFetch(item.file, tags, (pct, phase)=>{
      item.progress = pct;
      if(phase) item.status = phase;
      renderUploadQueue();
    });
    if(res.ok){
      item.status='success'; success++;
      uploadedFilesForGrid.push({
        file_id: res.fileId, file_name: item.file.name,
        file_type: item.file.type.startsWith('video') ? 'video' : 'image',
        file_url: res.fileUrl, tags: tags, show_hide: 'show'
      });
      document.getElementById('upload-thumbs-wrap').classList.remove('hidden');
      renderThumbGrid('upload-thumbs', 'upload', uploadedFilesForGrid);
    }
    else{
      // ถ้า fail เพราะ lock ชนกัน (อัปโหลดพร้อมกันหลายไฟล์) ให้รอแป๊บแล้ว retry อัตโนมัติ 1 ครั้งก่อน
      const isLockError = (res.error||'').includes('ล็อก') || (res.error||'').toLowerCase().includes('lock');
      if(isLockError && !item.autoRetried){
        item.autoRetried = true;
        item.status = 'pending'; item.progress = 0; item.error = null;
        renderUploadQueue();
        await new Promise(r=>setTimeout(r, 2000)); // เว้นจังหวะให้ lock ว่าง
        return; // ปล่อยกลับเข้าคิว worker หยิบไปทำใหม่เอง
      }
      item.status='fail'; item.error = res.error || 'ไม่ทราบสาเหตุ'; fail++;
    }
    renderUploadQueue();
    document.getElementById('upload-summary').textContent = `สำเร็จ ${success} | ล้มเหลว ${fail}`;
  }

  // worker pool: รันพร้อมกันได้สูงสุด MAX_CONCURRENT_UPLOADS ไฟล์ ที่เหลือรอคิวอัตโนมัติ
  async function worker(){
    let item;
    while((item = uploadQueue.find(q=>q.status==='pending'))){
      item.status = 'claimed'; // กันตัว worker อื่นหยิบไฟล์เดียวกันซ้ำ
      await runOne(item);
    }
  }

  const workers = Array.from({length: MAX_CONCURRENT_UPLOADS}, () => worker());
  await Promise.all(workers);

  uploadRunning = false;
  if(success>0 || fail>0){
    toast(`อัปโหลดเสร็จรอบนี้: สำเร็จ ${success}, ล้มเหลว ${fail}`);
    if(success>0){
      api('notifyUploadBatch', { count: success+fail, success, fail, tags });
    }
    await refreshData();
  }
}

// หมายเหตุสำคัญ: ห้ามใช้ xhr.upload.onprogress กับ Apps Script Web App
// เพราะจะทำให้เบราว์เซอร์ส่ง CORS preflight (OPTIONS) ซึ่ง Apps Script ไม่รองรับ -> ถูกบล็อกทันที
// ใช้ fetch() แบบ simple request แทน + progress ช่วงอ่านไฟล์จริง + progress จำลองช่วงส่งเครือข่าย
async function uploadFileFetch(file, tags, onProgress){
  let base64;
  try{
    base64 = await fileToBase64(file, (pct)=> onProgress(pct, 'uploading')); // 0-45% = อ่านไฟล์จริง
  }catch(e){
    return { error: 'อ่านไฟล์ไม่สำเร็จ' };
  }

  onProgress(50, 'uploading');
  let fake = 50;
  const ticker = setInterval(()=>{
    fake = Math.min(fake + 4, 92);
    onProgress(fake, 'uploading');
  }, 350);

  try{
    const response = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action:'upload', uid: STATE.uid, fileName:file.name, mimeType:file.type, base64, tags })
    });
    clearInterval(ticker);
    onProgress(97, 'saving');
    const json = await response.json();
    onProgress(100);
    return json;
  }catch(err){
    clearInterval(ticker);
    return { error: 'เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ (เช็ค API_URL หรือ deploy ใหม่): ' + err.message };
  }
}

function fileToBase64(file, onProgress){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onprogress = (e)=>{
      if(e.lengthComputable && onProgress) onProgress(Math.round((e.loaded/e.total)*45));
    };
    reader.onload = ()=>{ if(onProgress) onProgress(45); resolve(reader.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---- sync with chunk progress ----
async function startSync(){
  const raw = document.getElementById('sync-input').value;
  const ids = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if(ids.length===0) return;
  const box = document.getElementById('sync-progress');
  const reportBox = document.getElementById('sync-folder-report');
  const thumbBox = document.getElementById('sync-thumbs');
  box.innerHTML = `<div class="loader mb-2"></div><div id="sync-status">กำลังสแกนโฟลเดอร์ (รวมซับโฟลเดอร์)...</div>`;
  reportBox.innerHTML = ''; thumbBox.innerHTML = '';

  let done = false, totalAdded=0, totalDup=0, totalType=0, folderErrors=[], reportShown=false;
  let syncedFiles = [];
  const syncTags = Array.from(syncSelectedTags).join(',');
  while(!done){
    const res = await api('sync', { folderIds: ids, tags: syncTags });
    if(res.error){ box.innerHTML = `<span class="text-red-500">${res.error}</span>`; return; }
    done = res.done;
    totalAdded += res.addedThisBatch;
    totalDup += res.skippedDuplicateThisBatch || 0;
    totalType += res.skippedTypeThisBatch || 0;
    if(res.folderErrors && res.folderErrors.length) folderErrors = res.folderErrors;

    if(!reportShown && res.folderReport && res.folderReport.length){
      reportBox.innerHTML = res.folderReport.map(r=>`<div>${r}</div>`).join('');
      reportShown = true;
    }

    // สะสมไฟล์ที่เพิ่งเพิ่มสำเร็จ แล้ว render เป็น thumbnail แบบเดียวกับหน้าแรก (คลิกดูได้เต็มออฟชั่น)
    if(res.addedFiles && res.addedFiles.length){
      syncedFiles = syncedFiles.concat(res.addedFiles);
      renderThumbGrid('sync-thumbs', 'sync', syncedFiles);
    }

    document.getElementById('sync-status').textContent =
      `กำลังประมวลผล ${res.progress}/${res.total} — เพิ่ม ${totalAdded} | ซ้ำ ${totalDup} | ไม่ใช่ภาพ/วีดีโอ ${totalType}`;
  }

  let errHtml = '';
  if(folderErrors.length){
    errHtml = `<div class="mt-2 text-red-500 text-xs"><i class="fa-solid fa-triangle-exclamation mr-1"></i>บางโฟลเดอร์เข้าไม่ได้ (เช็คสิทธิ์ Drive):<br>${folderErrors.join('<br>')}</div>`;
  }
  box.innerHTML += `<div class="mt-2 text-green-600 text-sm"><i class="fa-solid fa-circle-check mr-1"></i>เสร็จสิ้น: เพิ่ม ${totalAdded} | ซ้ำ ${totalDup} | ไม่ใช่ภาพ/วีดีโอ ${totalType}</div>${errHtml}`;
  toast(`ซิงค์เสร็จ: เพิ่ม ${totalAdded} ไฟล์`);
  await refreshData();
}

function manageFilteredFiles(){
  let list = STATE.files;

  else if(MANAGE.tags.size>0) list = list.filter(f=>fileTags(f).some(t=>MANAGE.tags.has(t)));

}

async function deleteTagPermanent(name){
  const ok = await showConfirm(`ลบ tag #${name} ออกจากระบบถาวร? (จะถูกล้างออกจากทุกไฟล์ที่ติดอยู่ด้วย)`);
  if(!ok) return;
  const res = await api('deleteTag', { tagName: name });
  if(res.error){ toast('ลบ tag ไม่สำเร็จ: ' + res.error, 'err'); return; }
  STATE.tags = STATE.tags.filter(t=>t.tag_name!==name);
  MANAGE.pendingTagAdd.delete(name);
  MANAGE.tags.delete(name);
  toast(`ลบ tag #${name} แล้ว (ล้างจาก ${res.cleaned} ไฟล์)`);
  await refreshData();
}
function togglePendingTag(name){
  MANAGE.pendingTagAdd.has(name) ? MANAGE.pendingTagAdd.delete(name) : MANAGE.pendingTagAdd.add(name);
  renderTagPicker();
}
async function createNewTagInline(){
  const input = document.getElementById('new-tag-input');
  const name = input.value.trim();
  if(!name) return;
  const res = await api('createTag', { tagName: name, visibility: '' });
  if(res.error){ toast('สร้าง tag ไม่สำเร็จ: ' + res.error, 'err'); return; }
  STATE.tags.push({ tag_name: name, visibility: '' });
  MANAGE.pendingTagAdd.add(name);
  input.value = '';
  renderTagPicker(); renderManageFilters(); renderFilters();
  toast(`สร้าง tag #${name} แล้ว`);
}
async function applyTagsToSelected(mode){
  const ids = getSelectedIds();
  if(ids.length===0){ toast('ยังไม่ได้เลือกไฟล์', 'err'); return; }
  if(MANAGE.pendingTagAdd.size===0){ toast('ยังไม่ได้เลือก tag', 'err'); return; }
  const payload = { fileIds: ids };
  if(mode==='remove') payload.tagsToRemove = Array.from(MANAGE.pendingTagAdd);
  else payload.tagsToAdd = Array.from(MANAGE.pendingTagAdd);
  const res = await api('bulkUpdate', payload);
  if(res.error){ toast((mode==='remove'?'ลบ':'ติด') + ' tag ไม่สำเร็จ: ' + res.error, 'err'); return; }
  toast(`${mode==='remove'?'ลบ':'ติด'} tag ${ids.length} ไฟล์แล้ว`);
  MANAGE.pendingTagAdd.clear();
  await refreshData();
}

async function bulkDelete(){
  const ids = getSelectedIds(); if(ids.length===0){ toast('ยังไม่ได้เลือกไฟล์','err'); return; }
  const ok = await showConfirm(`ลบข้อมูล ${ids.length} ไฟล์ออกจากระบบ? (ไฟล์จริงใน Drive จะไม่ถูกลบ)`);
  if(!ok) return;
  const res = await api('deleteFiles', { fileIds: ids });
  if(res.error){ toast('ลบไม่สำเร็จ: ' + res.error, 'err'); return; }
  toast(`ลบ ${ids.length} ไฟล์ออกจากระบบแล้ว`);
  await refreshData();
}
// ---- toggle ปุ่มลัดบนการ์ด (show_admin_shortcuts) จากหน้าเว็บ ไม่ต้องไปแก้ชีต ----
function shortcutsOn(){
  return String(STATE.config.show_admin_shortcuts).toLowerCase() !== 'false';
}
function updateShortcutToggleBtn(){
  const btn = document.getElementById('shortcut-toggle-btn');
  if(!btn) return;
  if(shortcutsOn()){
    // เปิด = พื้นดำตัวขาว (ภาษาเดียวกับ pill active ตามธีม)
    btn.className = 'w-9 h-9 md:w-10 md:h-10 rounded-xl bg-black text-white flex items-center justify-center';
    btn.innerHTML = '<i class="fa-solid fa-eye"></i>';
  } else {
    btn.className = 'w-9 h-9 md:w-10 md:h-10 rounded-xl text-gray-400 hover:text-black hover:bg-gray-100 flex items-center justify-center';
    btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
  }
}
async function toggleAdminShortcuts(){
  const newVal = shortcutsOn() ? 'FALSE' : 'TRUE';
  STATE.config.show_admin_shortcuts = newVal; // อัปเดตหน้าจอทันที ไม่รอเซิร์ฟเวอร์
  updateShortcutToggleBtn();
  applyFilters(); // re-render การ์ดให้ปุ่มลัดโผล่/หายทันที
  const res = await api('setConfig', { key: 'show_admin_shortcuts', value: newVal });
  if(res.error){
    toast('บันทึกลงชีตไม่สำเร็จ: ' + res.error, 'err');
    return;
  }
  toast(newVal==='TRUE' ? 'เปิดปุ่มลัดบนการ์ดแล้ว' : 'ปิดปุ่มลัดบนการ์ดแล้ว');
}

function showProfilePic(url){
  if(!url) return;
  document.getElementById('profile-viewer-img').src = url;
  document.getElementById('profile-viewer').style.display = 'flex';
}

// ---- user management (bulk) ----
async function loadAllUsers(){
  const box = document.getElementById('all-users-list');
  if(!box) return;
  const res = await api('listUsers', {});
  if(res.error){ box.innerHTML = `<div class="p-3 text-red-500">${res.error}</div>`; return; }
  box.innerHTML = (res.users||[]).map(u=>`
    <label class="flex items-center gap-2 px-3 py-2 border-b last:border-b-0 cursor-pointer hover:bg-gray-50">
      <input type="checkbox" class="user-check w-4 h-4" value="${u.line_user_id}">
      <img src="${u.picture_url||''}" class="w-7 h-7 rounded-full bg-gray-100 cursor-zoom-in" onclick="event.preventDefault(); event.stopPropagation(); showProfilePic('${u.picture_url||''}')" onerror="this.style.visibility='hidden'">
      <span class="flex-1 truncate text-gray-700">${u.display_name || u.line_user_id}</span>
      <span class="text-[10px] px-2 py-0.5 rounded-full ${u.role==='admin'?'bg-black text-white':'border border-gray-300 text-gray-500'}">${u.role||'-'}</span>
    </label>`).join('') || `<div class="p-3 text-gray-300">ยังไม่มีผู้ใช้</div>`;
}
function selectAllUsers(state){
  document.querySelectorAll('.user-check').forEach(c=>c.checked=state);
}
function getSelectedUserIds(){
  return Array.from(document.querySelectorAll('.user-check:checked')).map(c=>c.value);
}
async function bulkSetUserRole(role){
  const ids = getSelectedUserIds();
  if(ids.length===0){ toast('ยังไม่ได้เลือกผู้ใช้','err'); return; }
  const res = await api('bulkUpdateUsers', { targetUids: ids, role });
  if(res.error){ toast('ปรับสิทธิ์ไม่สำเร็จ: '+res.error,'err'); return; }
  let msg = `ปรับสิทธิ์ ${res.updated} คนเป็น ${role} แล้ว`;
  if(res.skippedSelf>0) msg += ' (ข้ามตัวเอง — ห้ามลดสิทธิ์ตัวเอง)';
  toast(msg);
  loadAllUsers();
}
async function bulkRemoveUsers(){
  const ids = getSelectedUserIds();
  if(ids.length===0){ toast('ยังไม่ได้เลือกผู้ใช้','err'); return; }
  const ok = await showConfirm(`ถอนสิทธิ์ ${ids.length} คนออกจากระบบ? (พวกเขาจะเข้าเว็บไม่ได้จนกว่าจะอนุมัติใหม่)`);
  if(!ok) return;
  const res = await api('bulkUpdateUsers', { targetUids: ids, remove: true });
  if(res.error){ toast('ถอนสิทธิ์ไม่สำเร็จ: '+res.error,'err'); return; }
  let msg = `ถอนสิทธิ์ ${res.removed} คนแล้ว`;
  if(res.skippedSelf>0) msg += ' (ข้ามตัวเอง — ห้ามถอนสิทธิ์ตัวเอง)';
  toast(msg);
  loadAllUsers();
}

// ---- tag visibility management (bulk) ----
function renderTagVisibilityList(){
  const box = document.getElementById('tag-visibility-list');
  if(!box) return;
  box.innerHTML = STATE.tags.map(t=>`
    <label class="flex items-center gap-2 px-3 py-2 border-b last:border-b-0 cursor-pointer hover:bg-gray-50">
      <input type="checkbox" class="tagvis-check w-4 h-4" value="${t.tag_name}">
      <span class="flex-1 truncate text-gray-700">#${t.tag_name}</span>
      <span class="text-[10px] px-2 py-0.5 rounded-full ${t.visibility==='admin'?'bg-black text-white':'border border-gray-300 text-gray-500'}">
        ${t.visibility==='admin'?'<i class="fa-solid fa-lock mr-0.5"></i>เฉพาะแอดมิน':'<i class="fa-solid fa-lock-open mr-0.5"></i>ทุกคน'}
      </span>
    </label>`).join('') || `<div class="p-3 text-gray-300">ยังไม่มี tag ในระบบ</div>`;
}
async function bulkSetTagVisibility(visibility){
  const names = Array.from(document.querySelectorAll('.tagvis-check:checked')).map(c=>c.value);
  if(names.length===0){ toast('ยังไม่ได้เลือก tag','err'); return; }
  const res = await api('bulkUpdateTags', { tagNames: names, visibility });
  if(res.error){ toast('ปรับสิทธิ์ tag ไม่สำเร็จ: '+res.error,'err'); return; }
  toast(`ปรับสิทธิ์ ${res.updated} tag แล้ว`);
  // อัปเดต state ในเครื่องให้ตรง แล้ว re-render
  STATE.tags.forEach(t=>{ if(names.includes(t.tag_name)) t.visibility = visibility; });
  renderTagVisibilityList();
  renderTagPicker(); renderManageFilters();
}

async function approveUser(uid, name, pic, role){
  const res = await api('approveUser', { targetUid: uid, displayName: name, pictureUrl: pic, role });
  if(res.error){ toast('อนุมัติไม่สำเร็จ: ' + res.error, 'err'); return; }
  toast(`อนุมัติ ${name} เป็น ${role} แล้ว`);
  await refreshData();
  if(!document.getElementById('admin-panel').classList.contains('hidden')) openPanel('manage');
}

window.onload = boot;
